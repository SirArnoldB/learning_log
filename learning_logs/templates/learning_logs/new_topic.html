{% extends "learning_logs/base.html" %}

{% block content %}
    <p>Add a new topic:</p>

    <form action="{% url 'learning_logs:new_topic' %}" method="post">
        <!-- template tag to prevent cross-site request forgery -->
        {% csrf_token %}    
        <!-- Display the form -->
        {{ form.as_p }}
        <button name="submit">Add topic</button>
    </form>
{% endblock content %}
